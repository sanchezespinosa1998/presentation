<style>
:root{
  --navy-0:#04101F;
  --navy-1:#071B34;
  --navy-2:#0A2342;
  --navy-3:#0E2C52;
  --blue:#2F80FF;
  --blue-bright:#4F9BFF;
  --cyan:#38E8FF;
  --teal:#23D6A8;
  --violet:#8B7CFF;
  --amber:#FFB547;
  --ink:#EAF2FF;
  --ink-soft:#A9C0E0;
  --ink-dim:#6A86AB;
  --line:rgba(120,160,220,0.14);
  --glass:rgba(120,170,255,0.06);
  --glass-2:rgba(120,170,255,0.10);
  --font-display:'Sora',sans-serif;
  --font-body:'Manrope',sans-serif;
  --font-mono:'Space Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#020A14;overflow:hidden;font-family:var(--font-body);}
body{display:flex;align-items:center;justify-content:center;}

#viewport{position:fixed;inset:0;overflow:hidden;}
#stage{
  position:absolute;top:50%;left:50%;
  width:1280px;height:720px;
  transform:translate(-50%,-50%) scale(1);
  transform-origin:center center;
}

/* ---------- SLIDE FRAME ---------- */
.slide{
  position:absolute;inset:0;
  width:1280px;height:720px;
  background:
    radial-gradient(120% 120% at 100% 0%, rgba(47,128,255,0.18) 0%, rgba(47,128,255,0) 42%),
    radial-gradient(100% 100% at 0% 100%, rgba(56,232,255,0.10) 0%, rgba(56,232,255,0) 40%),
    linear-gradient(160deg, var(--navy-1) 0%, var(--navy-0) 100%);
  color:var(--ink);
  opacity:0;visibility:hidden;
  transform:scale(1.02);
  transition:opacity .6s ease, transform .6s ease, visibility .6s;
  overflow:hidden;
  padding:64px 76px;
}
.slide.active{opacity:1;visibility:visible;transform:scale(1);}

/* background texture layers */
.slide::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(120,160,220,0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(120,160,220,0.045) 1px, transparent 1px);
  background-size:44px 44px;
  mask-image:radial-gradient(120% 100% at 50% 0%, #000 30%, transparent 85%);
  -webkit-mask-image:radial-gradient(120% 100% at 50% 0%, #000 30%, transparent 85%);
}
.orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.5;pointer-events:none;}

/* ---------- SHARED TYPE ---------- */
.kicker{
  font-family:var(--font-mono);font-size:12.5px;letter-spacing:.32em;text-transform:uppercase;
  color:var(--cyan);display:flex;align-items:center;gap:12px;
}
.kicker::before{content:"";width:26px;height:1.5px;background:linear-gradient(90deg,var(--cyan),transparent);}
h1.title{font-family:var(--font-display);font-weight:700;letter-spacing:-0.02em;line-height:1.04;}
.lede{color:var(--ink-soft);font-weight:400;line-height:1.5;}
.stat-num{font-family:var(--font-display);font-weight:800;letter-spacing:-0.03em;line-height:.95;
  background:linear-gradient(120deg,#fff 0%, var(--blue-bright) 60%, var(--cyan) 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}

/* glass card */
.glass{
  background:linear-gradient(160deg, var(--glass-2), var(--glass));
  border:1px solid var(--line);
  border-radius:18px;
  backdrop-filter:blur(8px);
  position:relative;overflow:hidden;
}
.glass::after{content:"";position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(160deg, rgba(255,255,255,0.06), transparent 40%);pointer-events:none;}

/* chrome: top bar, footer */
.chrome-top{position:absolute;top:0;left:0;right:0;height:5px;background:rgba(255,255,255,0.04);z-index:5;}
.chrome-prog{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));box-shadow:0 0 14px var(--cyan);transition:width .5s ease;}
.foot{position:absolute;bottom:26px;left:76px;right:76px;display:flex;justify-content:space-between;align-items:center;
  font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;color:var(--ink-dim);text-transform:uppercase;z-index:5;}
.foot .brand{display:flex;align-items:center;gap:9px;color:var(--ink-soft);}
.logo-dot{width:16px;height:16px;border-radius:5px;background:linear-gradient(135deg,var(--blue),var(--cyan));box-shadow:0 0 12px rgba(56,232,255,.6);position:relative;}
.logo-dot::after{content:"";position:absolute;inset:4px;border-radius:2px;background:var(--navy-0);}

/* reveal animation */
.r{opacity:0;transform:translateY(22px);transition:opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1);}
.active .r{opacity:1;transform:translateY(0);}
.active .r.d1{transition-delay:.10s}.active .r.d2{transition-delay:.20s}.active .r.d3{transition-delay:.30s}
.active .r.d4{transition-delay:.40s}.active .r.d5{transition-delay:.50s}.active .r.d6{transition-delay:.60s}
.active .r.d7{transition-delay:.70s}.active .r.d8{transition-delay:.80s}

/* nav */
#nav{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:50;
  padding:9px 14px;border-radius:30px;background:rgba(7,27,52,0.6);border:1px solid var(--line);backdrop-filter:blur(10px);}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(169,192,224,0.3);cursor:pointer;transition:all .3s;}
.dot.on{background:var(--cyan);width:22px;border-radius:4px;box-shadow:0 0 10px var(--cyan);}
.arrow{position:fixed;top:50%;transform:translateY(-50%);width:42px;height:42px;border-radius:50%;
  background:rgba(7,27,52,0.55);border:1px solid var(--line);color:var(--ink-soft);cursor:pointer;z-index:50;
  display:flex;align-items:center;justify-content:center;font-size:18px;backdrop-filter:blur(8px);transition:.25s;}
.arrow:hover{background:var(--blue);color:#fff;border-color:var(--blue);}
#prev{left:18px}#next{right:18px}
.hint{position:fixed;top:16px;right:20px;font-family:var(--font-mono);font-size:10px;letter-spacing:.15em;color:var(--ink-dim);z-index:50;text-transform:uppercase;}

/* ============ COMPONENT HELPERS ============ */
.pill{display:inline-flex;align-items:center;gap:7px;padding:6px 13px;border-radius:30px;border:1px solid var(--line);
  background:var(--glass);font-size:12px;font-weight:600;color:var(--ink-soft);letter-spacing:.02em;}
.tag-good{color:var(--teal);} .tag-blue{color:var(--cyan);}
.divider{height:1px;background:linear-gradient(90deg,var(--line),transparent);}
.icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(150deg,rgba(47,128,255,.22),rgba(56,232,255,.10));border:1px solid var(--line);font-size:22px;}

/* bar chart */
.barrow{display:grid;grid-template-columns:170px 1fr 84px;align-items:center;gap:16px;}
.bartrack{height:30px;border-radius:8px;background:rgba(120,160,220,0.08);overflow:hidden;position:relative;}
.barfill{height:100%;border-radius:8px;width:0;transition:width 1s cubic-bezier(.2,.7,.2,1) .25s;
  background:linear-gradient(90deg,var(--blue),var(--cyan));box-shadow:0 0 16px rgba(56,232,255,.35) inset;}
.active .barfill{}

/* utility */
.flex{display:flex;} .col{flex-direction:column;} .between{justify-content:space-between;}
.center{align-items:center;} .wrap{flex-wrap:wrap;}
.grid{display:grid;}
.mono{font-family:var(--font-mono);}
.up{text-transform:uppercase;letter-spacing:.16em;}
.soft{color:var(--ink-soft);} .dim{color:var(--ink-dim);}

/* page number badge */
.pageno{font-family:var(--font-mono);font-size:11px;color:var(--ink-dim);}
</style>
</head>

  sec.innerHTML=html
    + (i>0 && i<total-1 ? `<div class="foot"><div class="brand"><span class="logo-dot"></span>${SECTION}</div><div class="pageno">${String(i+1).padStart(2,'0')} / ${String(total).padStart(2,'0')}</div></div>`:'')
    + `<div class="chrome-top"><div class="chrome-prog" style="width:${((i+1)/total*100)}%"></div></div>`;
  stage.appendChild(sec);
});
const slides=[...document.querySelectorAll('.slide')];

const nav=document.getElementById('nav');
slides.forEach((_,i)=>{const d=document.createElement('div');d.className='dot';d.onclick=()=>go(i);nav.appendChild(d);});
const dots=[...document.querySelectorAll('.dot')];

let cur=0;
function go(i){
  cur=Math.max(0,Math.min(total-1,i));
  slides.forEach((s,idx)=>s.classList.toggle('active',idx===cur));
  dots.forEach((d,idx)=>d.classList.toggle('on',idx===cur));
  // trigger bar fills on active slide
  const act=slides[cur];
  act.querySelectorAll('.barfill').forEach(b=>{b.style.width='0';requestAnimationFrame(()=>{setTimeout(()=>b.style.width=b.dataset.w+'%',60);});});
}
function next(){go(cur+1);} function prev(){go(cur-1);}
document.getElementById('next').onclick=next;
document.getElementById('prev').onclick=prev;
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();next();}
  if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();prev();}
  if(e.key==='Home')go(0); if(e.key==='End')go(total-1);
});
// touch
let tx=0;
document.addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50){dx<0?next():prev();}},{passive:true});

function scale(){
  const s=Math.min(window.innerWidth/1280, window.innerHeight/720);
  stage.style.transform=`translate(-50%,-50%) scale(${s})`;
}
window.addEventListener('resize',scale);
scale();go(0);
</script>
</body>
</html>
